<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="j-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1abc9c" />
    </linearGradient>
    <filter id="j-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Dark Background Canvas -->
  <rect x="12" y="12" width="104" height="104" rx="14" fill="#000000" />

  <!-- Figma Frame Selection Border -->
  <rect x="12" y="12" width="104" height="104" rx="14" fill="rgba(24, 160, 251, 0.14)" stroke="#18a0fb" stroke-width="5" />

  <!-- Figma Corner Bounding Handles -->
  <rect x="5" y="5" width="15" height="15" rx="3" fill="#ffffff" stroke="#18a0fb" stroke-width="2.5" />
  <rect x="108" y="5" width="15" height="15" rx="3" fill="#ffffff" stroke="#18a0fb" stroke-width="2.5" />
  <rect x="5" y="108" width="15" height="15" rx="3" fill="#ffffff" stroke="#18a0fb" stroke-width="2.5" />
  <rect x="108" y="108" width="15" height="15" rx="3" fill="#ffffff" stroke="#18a0fb" stroke-width="2.5" />

  <!-- Creative Stylized Monogram Letter "J" -->
  <g filter="url(#j-glow)">
    <path d="M42 32 H86 V46 H71 V74 C71 85 63 94 49 94 C37 94 29 86 27 77 L41 74 C42 79 45 82 49 82 C55 82 57 78 57 71 V32 H42 Z" fill="url(#j-grad)" />
    <!-- Bright Top Accent Sparkle Dot -->
    <circle cx="81" cy="39" r="3.5" fill="#ffffff" />
  </g>
</svg>