<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 100% Edge-to-Edge Figma Frame with Solid Black Fill -->
  <rect x="4" y="4" width="120" height="120" rx="14" fill="#000000" stroke="#18a0fb" stroke-width="6" />

  <!-- 4 Outer Corner Figma Bounding Handles -->
  <rect x="0" y="0" width="18" height="18" rx="3.5" fill="#ffffff" stroke="#18a0fb" stroke-width="3" />
  <rect x="110" y="0" width="18" height="18" rx="3.5" fill="#ffffff" stroke="#18a0fb" stroke-width="3" />
  <rect x="0" y="110" width="18" height="18" rx="3.5" fill="#ffffff" stroke="#18a0fb" stroke-width="3" />
  <rect x="110" y="110" width="18" height="18" rx="3.5" fill="#ffffff" stroke="#18a0fb" stroke-width="3" />

  <!-- Ultra-Bold Heavy Modern Sans-Serif Monogram Letter J -->
  <text x="64" y="92" font-family="'Cabinet Grotesk', 'Syne', 'Inter', -apple-system, 'Segoe UI', 'Arial Black', sans-serif" font-size="92" font-weight="900" text-anchor="middle" fill="#ffffff">J</text>
</svg>